  .toolbar button {

  }

  .toolbar button:hover { background: #f3f4f6; }

    cursor: pointer; user-select: none;

    transition: background .12s;

  }

  .row:hover { background: #f9fafb; }

  .row.code { cursor: default; }

  .row.code:hover { background: transparent; }



  .toggle {

    display: inline-block; width: 18px; text-align: center;

    color: #6b7280; font-size: 11px; transition: transform .15s;

  }

  .row.open > .toggle { transform: rotate(90deg); }

  .row.code .toggle { visibility: hidden; }

  .count {

  .level-0 { background: #eaf3fb; font-size: 15px; }

  .level-0 .name { color: #1e3a5f; font-weight: 700; }

  .level-0 .count { color: #1e3a5f; font-size: 16px; }



  .level-1 { background: #f7fafd; padding-left: 32px; }

  .level-1 .name { color: #2c5282; }

  }

  .bar > span {

    display: block; height: 100%; background: linear-gradient(90deg, #4f8ec7, #1e3a5f);

    border-radius: 3px;

  }

  .level-0 .bar > span { background: linear-gradient(90deg, #1e3a5f, #0f1f33); }

  .level-1 .bar > span { background: linear-gradient(90deg, #4f8ec7, #2c5282); }

  .level-2 .bar > span { background: linear-gradient(90deg, #93c5fd, #4f8ec7); }



  .children { display: none; }

  .row.open + .children { display: block; }



  .empty { padding: 20px; text-align: center; color: #9ca3af; }



  .hidden { display: none !important; }

  .footer {

function buildSummary() {

  const totalProd = DATA.length;

  const totalCtl = DATA.reduce((s, p) => s + p.ctls.length, 0);

  const totalCodes = DATA.reduce((s, p) => s + p.ctls.reduce((s2, c) => s2 + c.codes.length, 0), 0);

  const totalCount = DATA.reduce((s, p) => s + p.total, 0);

  document.getElementById('summary').innerHTML = `

    <div class="stat"><div class="label">產品種類</div><div class="value">${totalProd}</div></div>

    <div class="stat"><div class="label">CTL 分類</div><div class="value">${totalCtl}</div></div>

    <div class="stat"><div class="label">Fail Code 種類</div><div class="value">${totalCodes}</div></div>

    <div class="stat"><div class="label">Fail Code 總次數</div><div class="value">${totalCount}</div></div>

  `;

}



function buildTree() {

  const maxProd = Math.max(...DATA.map(p => p.total));

  let html = '';

  DATA.forEach((prod, pi) => {

    const maxCtl = Math.max(...prod.ctls.map(c => c.total));

    html += `<div class="row level-0" data-search="${prod.name.toLowerCase()}" onclick="toggle(this)">

      <span class="toggle">▶</span>

      <span class="name">${prod.name}</span>

      <span class="bar"><span style="width:${prod.total/maxProd*100}%"></span></span>

      <span class="count">${prod.total}</span>

    </div><div class="children">`;

    prod.ctls.forEach(ctl => {

      const maxCode = Math.max(...ctl.codes.map(c => c.count));

      const ctlSearch = (ctl.name + ' ' + ctl.codes.map(c => c.code).join(' ')).toLowerCase();

      html += `<div class="row level-1" data-search="${ctlSearch}" onclick="toggle(this)">

        <span class="toggle">▶</span>

        <span class="name">${ctl.name}</span>

        <span class="bar"><span style="width:${ctl.total/maxCtl*100}%"></span></span>

        <span class="count">${ctl.total}</span>

      </div><div class="children">`;

      ctl.codes.forEach(code => {

        html += `<div class="row code level-2" data-search="${code.code.toLowerCase()}">

          <span class="toggle">·</span>

          <span class="name">${code.code}</span>

          <span class="bar"><span style="width:${code.count/maxCode*100}%"></span></span>

          <span class="count">${code.count}</span>

        </div>`;

      });

      html += `</div>`;

    });

    html += `</div>`;

  });

  document.getElementById('tree').innerHTML = html;

}



function toggle(el) {

  el.classList.toggle('open');

}



function expandAll() {

  document.querySelectorAll('.row').forEach(r => {

    if (!r.classList.contains('code')) r.classList.add('open');

  });

}

function collapseAll() {

  document.querySelectorAll('.row').forEach(r => r.classList.remove('open'));

}

function expandLevel(level) {

  collapseAll();

  document.querySelectorAll('.row.level-0').forEach(r => r.classList.add('open'));

  if (level >= 2) {

    document.querySelectorAll('.row.level-1').forEach(r => r.classList.add('open'));

  }

}



document.getElementById('search').addEventListener('input', e => {

  const q = e.target.value.trim().toLowerCase();

  if (!q) {

    document.querySelectorAll('.row, .children').forEach(el => el.classList.remove('hidden'));

    collapseAll();

    return;

  }

  // 標記符合的 code 列

  const codeRows = document.querySelectorAll('.row.code');

  codeRows.forEach(r => {

    if (r.dataset.search.includes(q)) r.classList.remove('hidden');

    else r.classList.add('hidden');

  });

  // 對父層判斷：有任何符合的子代或 CTL 名稱本身符合就展開

  document.querySelectorAll('.row.level-1').forEach(r => {

    const matchSelf = r.dataset.search.includes(q);

    const childrenDiv = r.nextElementSibling;

    const visibleCodes = childrenDiv.querySelectorAll('.row.code:not(.hidden)').length;

    if (matchSelf || visibleCodes > 0) {

      r.classList.remove('hidden');

      r.classList.add('open');

      // 若 CTL 名稱本身符合，展開所有子 code

      if (matchSelf) {

        childrenDiv.querySelectorAll('.row.code').forEach(c => c.classList.remove('hidden'));

      }

    } else {

      r.classList.add('hidden');

      r.classList.remove('open');

    }

  });

  document.querySelectorAll('.row.level-0').forEach(r => {

    const childrenDiv = r.nextElementSibling;

    const visibleCtls = childrenDiv.querySelectorAll('.row.level-1:not(.hidden)').length;

    if (visibleCtls > 0) {

      r.classList.remove('hidden');

      r.classList.add('open');

    } else {

      r.classList.add('hidden');

      r.classList.remove('open');

    }

  });

});



buildSummary();

buildTree();

expandLevel(1);

</script>

</body>
