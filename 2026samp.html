<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>維修異常反應分析</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0; padding: 24px;
    background: #f5f7fa; color: #1f2937;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 6px; color: #1e3a5f; }
  .sub { color: #6b7280; font-size: 13px; margin-bottom: 18px; }

.breadcrumb {
display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
background: white; padding: 12px 16px; border-radius: 8px;
box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 16px;
font-size: 14px;
}
.crumb {
padding: 4px 10px; background: #eaf3fb; color: #1e3a5f;
border-radius: 4px; cursor: pointer; font-weight: 500;
}
.crumb:hover { background: #d4e6f5; }
.crumb.current { background: #1e3a5f; color: white; cursor: default; }
.crumb-sep { color: #9ca3af; }

.step-title {
font-size: 15px; color: #6b7280; margin-bottom: 10px;
}
.step-title strong { color: #1e3a5f; }

/* 卡片網格：產品 / CTL 選擇 */
.grid {
display: grid; gap: 12px;
grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
}
.card {
background: white; padding: 18px; border-radius: 10px;
box-shadow: 0 1px 3px rgba(0,0,0,.08);
cursor: pointer; transition: all .15s;
border: 2px solid transparent;
display: flex; flex-direction: column; gap: 6px;
}
.card:hover {
transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30,58,95,.15);
border-color: #4f8ec7;
}
.card .name { font-size: 18px; font-weight: 700; color: #1e3a5f; }
.card .meta { font-size: 12px; color: #6b7280; }
.card .count { font-size: 24px; font-weight: 700; color: #2c5282; margin-top: 4px; }
.card .count small { font-size: 12px; font-weight: 400; color: #9ca3af; margin-left: 4px; }

/* Fail Code 表格 */
.report-card {
background: white; border-radius: 10px;
box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden;
}
.report-header {
padding: 16px 20px; background: #1e3a5f; color: white;
display: flex; justify-content: space-between; align-items: center;
flex-wrap: wrap; gap: 8px;
}
.report-header h2 { margin: 0; font-size: 18px; }
.report-header .total {
font-size: 14px; opacity: .9;
}
.report-header .total b { font-size: 20px; }

table {
width: 100%; border-collapse: collapse; font-size: 14px;
}
th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid #eef0f4; }
th {
background: #f7fafd; color: #4b5563; font-weight: 600;
font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
}
td.code {
font-family: “SF Mono”, Consolas, monospace; color: #1e3a5f; font-weight: 500;
}
td.num {
text-align: right; font-variant-numeric: tabular-nums; font-weight: 600;
color: #2c5282; width: 90px;
}
td.bar-cell { width: 35%; padding: 10px 16px; }
.bar {
height: 8px; background: #eef0f4; border-radius: 4px; overflow: hidden;
}
.bar > span {
display: block; height: 100%;
background: linear-gradient(90deg, #93c5fd, #2c5282);
border-radius: 4px;
}
tr:hover td { background: #f9fafb; }
td.pct { width: 60px; text-align: right; color: #6b7280; font-size: 12px; }

.footer {
margin-top: 18px; font-size: 12px; color: #9ca3af; text-align: center;
}

.back-btn {
background: white; border: 1px solid #d1d5db; padding: 6px 12px;
border-radius: 6px; cursor: pointer; font-size: 13px; color: #4b5563;
}
.back-btn:hover { background: #f3f4f6; }
</style>

</head>

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="crumb ${!state.product ? 'current' : ''}" onclick="goHome()">首頁</span>`;
  if (state.product) {
    html += `<span class="crumb-sep">›</span>`;
    html += `<span class="crumb ${!state.ctl ? 'current' : ''}" onclick="goProduct()">${state.product}</span>`;

  if (state.ctl) {
    html += `<span class="crumb-sep">›</span>`;
    html += `<span class="crumb current">${state.ctl}</span>`;
  }
  bc.innerHTML = html;
}

function renderProducts() {
  let html = '<div class="step-title">請選擇 <strong>產品種類</strong>：</div><div class="grid">';
  DATA.forEach(p => {
    html += `<div class="card" onclick="selectProduct('${p.name}')">
      <div class="name">${p.name}</div>
      <div class="meta">CTL 分類：${p.ctls.length} 種</div>
      <div class="count">${p.total}<small>次 fail</small></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderCtls() {
  const prod = DATA.find(p => p.name === state.product);
  let html = '<div class="step-title">請選擇 <strong>CTL 分類</strong>：</div><div class="grid">';
  prod.ctls.forEach(c => {
    html += `<div class="card" onclick="selectCtl('${c.name}')">
      <div class="name">${c.name}</div>
      <div class="meta">Fail Code：${c.codes.length} 種</div>
      <div class="count">${c.total}<small>次 fail</small></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderReport() {
  const prod = DATA.find(p => p.name === state.product);
  const ctl = prod.ctls.find(c => c.name === state.ctl);
  const max = Math.max(...ctl.codes.map(c => c.count));

  let rows = '';
  ctl.codes.forEach((c, i) => {
    const pct = (c.count / ctl.total * 100).toFixed(1);
    rows += `<tr>
      <td>${i + 1}</td>
      <td class="code">${c.code}</td>
      <td class="num">${c.count}</td>
      <td class="bar-cell"><div class="bar"><span style="width:${c.count/max*100}%"></span></div></td>
      <td class="pct">${pct}%</td>
    </tr>`;
  });

  document.getElementById('content').innerHTML = `
    <div class="report-card">
      <div class="report-header">
        <h2>${state.product} ／ ${state.ctl} — Fail Code 統計</h2>
        <div class="total">合計 <b>${ctl.total}</b> 次（${ctl.codes.length} 種代號）</div>
      </div>
      <table>
        <thead>
          <tr><th>#</th><th>Fail Code</th><th style="text-align:right">次數</th><th>分布</th><th style="text-align:right">佔比</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function selectProduct(name) { state.product = name; state.ctl = null; render(); }
function selectCtl(name) { state.ctl = name; render(); }
function goHome() { state.product = null; state.ctl = null; render(); }
function goProduct() { state.ctl = null; render(); }

render();
</script>
